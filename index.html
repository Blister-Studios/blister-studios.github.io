<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blister Studios</title>
    <style>
        :root {
            --bg-dark: #090a0f;
            --accent-cyan: #00e5ff;
            --accent-magenta: #ff0055;
            --text-main: #f0f4f8;
            --text-muted: #8b9bb4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            z-index: -2;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px) scale(3);
            animation: gridMove 5s linear infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(0, 229, 255, 0.1) 0%, rgba(9, 10, 15, 1) 60%);
            z-index: -1;
            top: 0; left: 0;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        .container {
            max-width: 800px;
            padding: 2rem;
            z-index: 10;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            max-width: 180px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.3));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); filter: drop-shadow(0 0 25px rgba(0, 229, 255, 0.6)); }
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--text-main), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 20px rgba(0, 229, 255, 0.2);
            position: relative;
            cursor: default;
        }

        h1:hover {
            animation: glitch 0.2s cubic-bezier(.25, .46, .45, .94) both infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        p {
            font-size: 1.3rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 3rem;
            font-weight: 300;
        }

        p strong {
            color: var(--accent-cyan);
            font-weight: 700;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
        }

        /* The Juicy Button */
        .cta-button {
            position: relative;
            display: inline-block;
            padding: 16px 40px;
            background: rgba(0, 229, 255, 0.05);
            color: var(--accent-cyan);
            text-transform: uppercase;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
            border: 2px solid var(--accent-cyan);
            border-radius: 6px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2), inset 0 0 15px rgba(0, 229, 255, 0.1);
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: all 0.5s ease;
            z-index: 1;
        }

        .cta-button:hover {
            background: var(--accent-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.6), 0 0 60px rgba(0, 229, 255, 0.4);
            transform: scale(1.05) translateY(-3px);
            border-color: #fff;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:active {
            transform: scale(0.95);
        }

        .social-links {
            margin-top: 4rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .social-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            position: relative;
        }

        .social-links a::after {
            content: '';
            position: absolute;
            bottom: -6px; left: 0;
            width: 0%;
            height: 2px;
            background-color: var(--accent-magenta);
            transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .social-links a:hover {
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }

        .social-links a:hover::after {
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Blister Studios</h1>
        <p>Independent game development studio. Currently building <strong>RiftRunner</strong>, a high-speed, dimension-shifting platformer.</p>
        
        <a href="https://discord.gg/fK9suABr" class="cta-button">Join the Discord</a>
        
        <div class="social-links">
            <a href="https://blisterstudios.itch.io">Itch/X</a>
            <a href="https://www.patreon.com/c/BlisterStudios">Patreon</a>
            <a href="https://github.com/Blister-Studios/">GitHub</a>
        </div>
    </div>

</body>
</html>
