<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blister Studios</title>
    <style>
        :root {
            --bg-color: #0f1216;
            --text-color: #e0e0e0;
            --accent-color: #00bcd4;
            --accent-hover: #0097a7;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 2rem;
        }

        .logo {
            max-width: 200px;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #a0aab5;
            margin-bottom: 2rem;
        }

        .cta-button {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: #111;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 4px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .cta-button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .social-links {
            margin-top: 3rem;
        }

        .social-links a {
            color: var(--accent-color);
            text-decoration: none;
            margin: 0 10px;
            font-weight: 500;
        }

        .social-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Blister Studios</h1>
        <p>Independent game development studio. Currently building <strong>RiftRunner</strong>, a high-speed, dimension-shifting platformer.</p>
        
        <a href="https://discord.gg/fK9suABr" class="cta-button">Join the Discord</a>
        
        <div class="social-links">
            <a href="#">Twitter/X</a>
            <a href="#">YouTube</a>
            <a href="https://github.com/Blister-Studios/">GitHub</a>
        </div>
    </div>

</body>
</html>
